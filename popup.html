<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: sans-serif;
        width: 220px;
        padding: 16px;
        margin: 0;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .status {
        font-size: 14px;
        color: #555;
      }

      /* Toggle switch */
      .switch {
        position: relative;
        display: inline-block;
        width: 42px;
        height: 24px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: #ccc;
        border-radius: 24px;
        transition: 0.3s;
      }

      .slider:before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        border-radius: 50%;
        transition: 0.3s;
      }

      input:checked + .slider {
        background-color: #e1306c;
      }

      input:checked + .slider:before {
        transform: translateX(18px);
      }
    </style>
  </head>
  <body>
    <h2>WTFgram</h2>
    <div class="row">
      <span class="status" id="status">Loading...</span>
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
